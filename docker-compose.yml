services:
  backend:
    build: ./backend
    volumes:
      - sqlite_data:/app/data
    env_file: .env
    environment:
      DATABASE_URL: "sqlite:////app/data/phoenix_finance.db"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
