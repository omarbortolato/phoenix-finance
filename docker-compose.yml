services:
  backend:
    build: ./backend
    volumes:
      - sqlite_data:/app/data
    environment:
      DATABASE_URL: "sqlite:////app/data/phoenix_finance.db"
    restart: unless-stopped

  frontend:
    build: ./frontend
    # Nessun ports: Coolify usa Traefik come reverse proxy.
    # Il dominio va configurato nella UI di Coolify → frontend service → Domain.
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
