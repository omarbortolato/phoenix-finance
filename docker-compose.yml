version: "3.9"

# Struttura Coolify: un unico docker-compose con backend + frontend (Phase 2).
# Coolify punta al container frontend (nginx) che fa reverse proxy a /api → backend.
# Per Phase 1 (solo backend), esponi direttamente la porta 8000.

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data   # SQLite persiste qui
    env_file: .env
    environment:
      DATABASE_URL: "sqlite:////app/data/phoenix_finance.db"
    restart: unless-stopped

  # frontend: aggiunto in Phase 2

volumes: {}
